model:
  name: "Qwen/Qwen3-VL-8B-Instruct"
  type: "qwen3_vl"
  hidden_dim: 4096
  num_layers: 32
  num_heads: 32
  vocab_size: 152064
  max_position_embeddings: 32768

vision:
  min_pixels: 200704    # 256 * 28 * 28
  max_pixels: 1003520   # 1280 * 28 * 28
  patch_size: 14
  temporal_patch_size: 2
  merge_size: 2
  dynamic_resolution: true

memory:
  num_probes: 16
  sampler_layers: 2
  sampler_heads: 8
  sampler_head_dim: 128
  output_dim: 4096
  probe_init_std: 0.02

autonomous:
  hidden_dim: 4096
  num_layers: 2
  activation: "gelu"
  use_layernorm: true
  num_memory_tokens: 16

loading:
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"
  device_map: "auto"
  trust_remote_code: true
