encoder:
  name: "medsam3"
  type: "vit_b"
  pretrained_path: "checkpoints/medsam3_vit_b.pth"

  architecture:
    image_size: 1024
    patch_size: 16
    embed_dim: 768
    depth: 12
    num_heads: 12
    mlp_ratio: 4.0
    out_chans: 256

  feature_extraction:
    output_spatial: [64, 64]
    output_channels: 1024
    hook_layer: "neck"
    flatten_spatial: true     # M = 64*64 = 4096 tokens

  segmentation_head:
    mask_threshold: 0.7
    max_masks: 3
    min_mask_area: 100
    use_top1_mask: true

  preprocessing:
    target_size: 1024
    pixel_mean: [123.675, 116.28, 103.53]
    pixel_std: [58.395, 57.12, 57.375]

  frozen: true
