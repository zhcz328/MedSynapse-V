stage: 3
name: "imt_distillation"

training:
  trainable_modules: ["autonomous_module"]
  freeze_vlm: true
  freeze_encoder: true
  freeze_memory_sampler: true
  freeze_lora: true

  optimizer:
    type: "adamw"
    lr: 1.0e-4
    betas: [0.9, 0.999]
    weight_decay: 1.0e-2
    eps: 1.0e-8

  scheduler:
    type: "cosine"
    warmup_ratio: 0.03
    min_lr_ratio: 0.0

  epochs: 3
  batch_size: 32
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  mixed_precision: "bf16"
  flash_attention: true

distillation:
  divergence: "jsd"
  jsd_beta: 0.5
  on_policy_samples: 1
  temperature: 1.0
  max_generation_length: 512

data:
  config: "configs/datasets/stage2_rl_mixed.yaml"

logging:
  log_interval: 50
  save_interval: 500
  eval_interval: 500

infrastructure:
  gpus: 4
  gpu_type: "A100-80GB"
