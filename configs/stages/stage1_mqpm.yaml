stage: 1
name: "mqpm_warmup"

training:
  trainable_modules: ["memory_sampler"]
  freeze_vlm: true
  freeze_encoder: true

  optimizer:
    type: "adamw"
    lr: 2.0e-4
    betas: [0.9, 0.999]
    weight_decay: 1.0e-2
    eps: 1.0e-8

  scheduler:
    type: "cosine"
    warmup_ratio: 0.03
    min_lr_ratio: 0.0

  epochs: 3
  batch_size: 32
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  mixed_precision: "bf16"
  flash_attention: true

loss:
  type: "ntp"
  label_smoothing: 0.0

data:
  config: "configs/datasets/stage1_pubmedvision.yaml"
  max_length: 512

logging:
  log_interval: 50
  save_interval: 500
  eval_interval: 500

infrastructure:
  gpus: 4
  gpu_type: "A100-80GB"
