stage: 2
name: "ccr_grpo"

training:
  trainable_modules: ["lora_adapters"]
  freeze_vlm_base: true
  freeze_encoder: true
  freeze_memory_sampler: true

  optimizer:
    type: "adamw"
    lr: 1.0e-5
    betas: [0.9, 0.999]
    weight_decay: 0.0
    eps: 1.0e-8

  scheduler:
    type: "cosine"
    warmup_ratio: 0.05
    min_lr_ratio: 0.0

  training_steps: 200
  rollout_batch_size: 32
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  mixed_precision: "bf16"
  flash_attention: true

lora:
  rank: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  modules_to_save: null

grpo:
  group_size: 4
  clip_eps: 0.2
  kl_coeff: 0.02
  temperature: 0.7
  top_p: 0.95
  max_generation_length: 1024
  advantage_eps: 1.0e-6

reward:
  lambda_acc: 1.0
  lambda_causal: 0.5

data:
  config: "configs/datasets/stage2_rl_mixed.yaml"

logging:
  log_interval: 10
  save_interval: 50
  eval_interval: 50

infrastructure:
  gpus: 4
  gpu_type: "A100-80GB"
